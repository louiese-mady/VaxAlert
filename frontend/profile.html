<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Settings</title>

<link rel="stylesheet" href="sidebar.css">

<style>
body { display:flex; background:#f1f5f9; font-family:"Segoe UI",sans-serif; }
.main { flex:1; padding:40px; }

h1 { font-size:24px; color:#1e293b; }
.sub { color:#64748b; margin-bottom:25px; font-size:14px; }

.card {
  background:white;
  border-radius:14px;
  padding:25px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  max-width:650px;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #cbd5e1;
  margin-top:5px;
  margin-bottom:15px;
}

.btn {
  background:#142e5c;
  color:white;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="sidebar-header">
      <img src="logo.png" class="sidebar-logo">
      <div class="sidebar-text">
        <div class="sidebar-title">VaxAlert</div>
        <div class="sidebar-sub">Reganion Children's Clinic</div>
      </div>
    </div>

    <div class="menu">
      <a href="parentdb.html">Dashboard</a>
      <a href="schedule.html">Schedule</a>
      <a href="history.html">History</a>
      <a href="preferences.html">Preferences</a>
      <a href="profile.html" class="active">Profile</a>
    </div>
  </div>

  <div class="profile">
    <div class="profile-name" id="sidebarName"></div>
    <div style="font-size:12px;color:#64748b;">parent</div>
    <div class="signout" onclick="logout()">Sign Out</div>
  </div>
</div>

<div class="main">
  <h1>Profile Settings</h1>
  <div class="sub">Manage your account information and security</div>

  <div class="card">
    <strong id="profileName"></strong><br><br>

    <label>Email Address</label>
    <input type="email" value="maria.reyes@example.com">

    <label>Contact Number</label>
    <input type="text" value="+63 917 123 4567">
  </div>

  <div class="card">
    <h3>Security</h3><br>

    <label>Current Password</label>
    <input type="password">

    <label>New Password</label>
    <input type="password">

    <label>Confirm New Password</label>
    <input type="password">

    <button class="btn">Save Changes</button>
  </div>
</div>

<script>
const name = localStorage.getItem("parentName") || "Maria";
document.getElementById("sidebarName").textContent = name;
document.getElementById("profileName").textContent = name;

function logout(){
  localStorage.removeItem("parentName");
  window.location.href="login.html";
}
</script>

</body>
</html>
