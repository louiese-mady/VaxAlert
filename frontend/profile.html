<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Settings</title>

<style>
body {
  margin: 0;
  background: #f1f5f9;
  font-family: "Segoe UI", sans-serif;
}

/* ───── SIDEBAR ───── */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100vh;
  background: white;
  border-right: 1px solid #e2e8f0;
  display: flex;
  flex-direction: column;
}

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 15px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  margin-bottom: 25px;
}

.sidebar-logo {
  width: 40px;
  margin-right: 10px;
}

.sidebar-title {
  font-weight: 700;
  font-size: 16px;
}

.sidebar-sub {
  font-size: 11px;
  color: #64748b;
}

.menu a {
  display: block;
  padding: 10px;
  margin-bottom: 6px;
  border-radius: 8px;
  text-decoration: none;
  color: #1e293b;
  font-size: 14px;
  transition: 0.2s;
}

.menu a:hover { background: #f1f5f9; }

.menu a.active {
  background: #142e5c;
  color: white;
}

.profile {
  padding: 20px 15px;   /* same horizontal padding as sidebar-content */
  border-top: 1px solid #e2e8f0;
  margin-top: auto;
}

.profile-name {
  font-weight: 600;
  margin-bottom: 4px;
}

.profile-role {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 12px;
}

.signout {
  font-size: 13px;
  color: #ef4444;
  cursor: pointer;
}

/* ───── MAIN ───── */
.main {
  margin-left: 260px;
  padding: 40px;
}

h1 { font-size: 24px; color: #1e293b; }
.sub { color: #64748b; margin-bottom: 25px; font-size: 14px; }

.card {
  background: white;
  border-radius: 14px;
  padding: 25px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  max-width: 650px;
  margin-bottom: 20px;
}

.card h3 { color: #1e293b; margin-bottom: 16px; }

label {
  display: block;
  font-size: 13px;
  margin-bottom: 6px;
  color: #334155;
  font-weight: 500;
}

input {
  width: 100%;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
  margin-bottom: 15px;
  font-size: 14px;
}

input:disabled { background: #f1f5f9; color: #64748b; }

.btn {
  background: #142e5c;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: background 0.2s;
}

.btn:hover { background: #0f2448; }

.form-msg {
  font-size: 13px;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 12px;
  display: none;
}

.form-msg.success {
  background: #f0fdf4;
  color: #166534;
  border: 1px solid #bbf7d0;
}

.form-msg.error {
  background: #fef2f2;
  color: #b91c1c;
  border: 1px solid #fecaca;
}

.field-hint {
  font-size: 11px;
  color: #64748b;
  margin-top: -10px;
  margin-bottom: 15px;
}

#loadingIndicator {
  text-align: center;
  padding: 20px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="sidebar-content">
    <div class="sidebar-header">
      <img src="logo.png" class="sidebar-logo">
      <div>
        <div class="sidebar-title">VaxAlert</div>
        <div class="sidebar-sub">Reganion Children's Clinic</div>
      </div>
    </div>

    <div class="menu">
      <a href="parentdb.html">Dashboard</a>
      <a href="schedule.html">Schedule</a>
      <a href="history.html">History</a>
      <a href="preferences.html">Preferences</a>
      <a href="profile.html" class="active">Profile</a>
    </div>
  </div>

  <div class="profile">
    <div class="profile-name" id="sidebarName">Loading...</div>
    <div class="profile-role">Parent</div>
    <div class="signout" onclick="logout()">Sign Out</div>
  </div>
</div>

<div class="main">
  <h1>Profile Settings</h1>
  <div class="sub">Manage your account information and security</div>

  <div id="loadingIndicator">
    <p>Loading profile information...</p>
  </div>

  <div class="card" id="profileCard" style="display:none;">
    <h3 id="profileFullName"></h3>
    <p id="profileRole" style="color:#64748b;font-size:13px;margin-bottom:16px;">
      Parent Account
    </p>

    <div id="profileMsg" class="form-msg"></div>

    <label>First Name</label>
    <input type="text" id="firstName">

    <label>Last Name</label>
    <input type="text" id="lastName">

    <label>Email Address</label>
    <input type="email" id="email" disabled>
    <div class="field-hint">Email cannot be changed for security reasons</div>

    <label>Contact Number</label>
    <input type="text" id="contactNumber">

    <button class="btn" onclick="saveProfileChanges()">Save Changes</button>
  </div>

  <div class="card" id="securityCard" style="display:none;">
    <h3>Security</h3>
    <p style="color:#64748b;font-size:13px;margin-bottom:16px;">
      Update your password
    </p>

    <div id="passwordMsg" class="form-msg"></div>

    <label>New Password</label>
    <input type="password" id="newPassword">

    <label>Confirm New Password</label>
    <input type="password" id="confirmPassword">

    <button class="btn" onclick="changePassword()">Update Password</button>
  </div>
</div>

<script>
const API_BASE_URL = "http://localhost:5502";

function getAuthToken() {
  return localStorage.getItem("idToken");
}

async function apiCall(endpoint, options = {}) {
  const token = getAuthToken();
  if (!token) {
    window.location.href = "login.html";
    return null;
  }

  const headers = {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${token}`,
    ...options.headers,
  };

  try {
    const response = await fetch(`${API_BASE_URL}${endpoint}`, {
      ...options,
      headers,
    });

    if (response.status === 401) {
      localStorage.clear();
      window.location.href = "login.html";
      return null;
    }

    if (!response.ok) {
      return { _error: true };
    }

    return await response.json();
  } catch (error) {
    console.error("API call failed:", error);
    return null;
  }
}

function showMsg(id, text, isError) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `form-msg ${isError ? "error" : "success"}`;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 4000);
}

async function loadProfile() {
  const loading = document.getElementById("loadingIndicator");

  const profile = await apiCall("/api/parent/profile");
  if (!profile || profile._error) {
    loading.innerHTML = '<p style="color:#b91c1c;">Failed to load profile.</p>';
    return;
  }

  const fullName = `${profile.firstName} ${profile.lastName}`;

  document.getElementById("sidebarName").textContent = fullName;
  document.getElementById("profileFullName").textContent = fullName;

  document.getElementById("firstName").value = profile.firstName || "";
  document.getElementById("lastName").value = profile.lastName || "";
  document.getElementById("email").value = profile.email || "";
  document.getElementById("contactNumber").value = profile.contactNumber || "";

  loading.style.display = "none";
  document.getElementById("profileCard").style.display = "block";
  document.getElementById("securityCard").style.display = "block";
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

document.addEventListener("DOMContentLoaded", loadProfile);
</script>

</body>
</html>
